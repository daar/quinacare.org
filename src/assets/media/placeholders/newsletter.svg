<!--
  Editable source for the newsletter featured-image placeholder.
  After editing, regenerate the PNG used by the posts with:

    node -e 'import("sharp").then(({default:s})=>s("src/assets/media/placeholders/newsletter.svg",{density:120}).resize(1200,750).png().toFile("src/assets/media/placeholders/newsletter.png"))'
-->
<svg width="1200" height="750" viewBox="0 0 1200 750" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3f4f6"/>
      <stop offset="1" stop-color="#e5e7eb"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#g)"/>
  <g transform="translate(600 300)" fill="none" stroke="#9ca3af" stroke-width="16" stroke-linejoin="round" stroke-linecap="round">
    <rect x="-150" y="-95" width="300" height="190" rx="20"/>
    <path d="M-150 -78 L0 40 L150 -78"/>
  </g>
  <text x="600" y="540" font-family="sans-serif" font-size="76" font-weight="700" fill="#4b5563" text-anchor="middle">Quina Care</text>
  <text x="600" y="600" font-family="sans-serif" font-size="30" font-weight="700" letter-spacing="6" fill="#9ca3af" text-anchor="middle">NIEUWSBRIEF · NEWSLETTER · BOLETÍN</text>
</svg>
